{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="card card--sm">
  <h1 class="title-orange">Sports Events</h1>
  <p class="subtitle">Register for upcoming events</p>

  <form method="POST" action="{{ url_for('main.index') }}" novalidate>
    <div class="field">
      <label for="full_name">Full Name</label>
      <input type="text" id="full_name" name="full_name"
             placeholder="Enter your name"
             value="{{ form.get('full_name', '') }}"
             class="{{ 'error' if errors.get('full_name') }}">
      {% if errors.get('full_name') %}
        <span class="field-error">{{ errors.full_name }}</span>
      {% endif %}
    </div>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email"
             placeholder="Enter your email"
             value="{{ form.get('email', '') }}"
             class="{{ 'error' if errors.get('email') }}">
      {% if errors.get('email') %}
        <span class="field-error">{{ errors.email }}</span>
      {% endif %}
    </div>

    <button type="submit" class="btn-primary">Continue to Events &rarr;</button>
  </form>
</div>
{% endblock %}
